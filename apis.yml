aid: babbel
name: Babbel
description: >-
  Babbel is a Berlin, Germany-based language learning company founded in 2007
  by Thomas Holl, Markus Witte, Lorenz Heine, and Toine Diepstraten. It
  operates one of the world's first online language-learning platforms,
  offering structured, conversation-focused courses in 14 languages including
  Spanish, French, German, Italian, Portuguese, Russian, Polish, Swedish,
  Norwegian, Danish, Dutch, Turkish, Indonesian, and English. The Babbel
  product suite includes the core subscription Babbel App with interactive
  bite-sized lessons, speech recognition, and AI conversation partners;
  Babbel Live for online classes with certified teachers; Babbel for
  Business for enterprise language training; Babbel Podcasts and Babbel
  Magazine for supplemental content; and Babbel Videos on YouTube. The
  company has sold over 25 million subscriptions and reports that 92% of
  users improved their proficiency in two months, with effectiveness
  studies conducted by Michigan State University, Yale University, and
  CUNY. Babbel maintains an additional office in New York City and is
  privately held. Babbel's revenue model is direct-to-consumer
  subscriptions (monthly, annual, lifetime tiers) plus enterprise B2B
  licensing through Babbel for Business; there is no public developer API,
  SDK, or open-source learner content. The Babbel GitHub organization
  publishes internal infrastructure tooling (Terraform AWS modules, Puma
  plugins, OkHttp AWS signing, GitHub Actions) but no consumer-facing API.
